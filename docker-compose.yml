services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  app:
    build: .
    depends_on:
      - redis
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - N_REQUESTS=500
      - ZIPF_S=2.0
      - DATA_PATH=../data/buildings.csv
    volumes:
      - ./results:/app/results
    restart: on-failure
